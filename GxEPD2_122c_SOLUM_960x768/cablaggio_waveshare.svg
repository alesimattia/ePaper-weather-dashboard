  <text x="500" y="345" fill="#bf8700" font-size="11" font-weight="bold"
        text-anchor="middle">FFC breakout esterno</text>
  <text x="500" y="365" fill="#656d76" font-size="10"
        text-anchor="middle">(per FFC #2 — slave)</text>
  <text x="500" y="385" fill="#656d76" font-size="10"
        text-anchor="middle">21-pin 0.5 mm</text>
  <text x="500" y="403" fill="#656d76" font-size="10"
        text-anchor="middle">jumper wire 3.3V</text>
  <text x="500" y="421" fill="#656d76" font-size="10"
