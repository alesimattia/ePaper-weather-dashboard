<svg viewBox="0 0 980 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="readmeArrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
  </defs>
  <rect x="40" y="60" width="320" height="360" rx="10"
        fill="#f6f8fa" stroke="#d0d7de" stroke-width="2"/>
  <text x="200" y="86" font-size="14" font-weight="bold"
        text-anchor="middle">Waveshare E-Paper ESP32 Driver Board</text>
  <rect x="80" y="110" width="240" height="100" rx="6"
        fill="#fff" stroke="#d0d7de"/>
  <text x="200" y="160" fill="#0969da" font-size="13"
