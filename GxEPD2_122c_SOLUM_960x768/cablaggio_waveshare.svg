  <rect x="815" y="200" width="100" height="30" rx="3"
        fill="#fff" stroke="#8250df"/>
  <text x="865" y="220" fill="#8250df" font-size="11"
        text-anchor="middle" font-weight="bold">FFC #2</text>
  <rect x="400" y="320" width="200" height="110" rx="4"
